<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nevim</title>
    <!-- Načtení geometrického písma + Noto Sans Symbols 2 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Symbols+2&family=Plus+Jakarta+Sans:wght@800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #000000;
            color: #ffffff;
            /* Prohlížeč zkusí nejdřív Jakarta Sans na písmena, a když narazí na symbol, vezme ho z Noto Sans Symbols */
            font-family: 'Plus Jakarta Sans', 'Noto Sans Symbols 2', sans-serif;
            font-weight: 900;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 50px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        h1 {
            font-size: 3.8rem;
            margin-bottom: 35px;
            letter-spacing: -1px;
        }
        .player-container {
            width: 100%;
            max-width: 350px;
            margin-bottom: 45px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        a {
            color: #ffffff;
            text-decoration: none;
            font-size: 2.7rem;
            padding: 6px 14px;
            transition: background 0.15s, color 0.15s;
        }
        a:hover {
            background-color: #ffffff;
            color: #000000;
        }
    </style>
</head>
<body>

    <!-- Můžeš sem teď házet jakékoliv speciální symboly, šipky, kostičky atd. -->
    <h1>My links</h1>

    <div class="player-container">
        <iframe data-testid="embed-iframe" style="border-radius:12px" src="https://open.spotify.com/embed/track/4zGwSKGXnfpBNHkavKnyIf?utm_source=generator&theme=0" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
    </div>

    <div class="links">
        <a href="https://www.instagram.com/strasiktomas_?igsh=eXFmdTdmOHQ3djA3&utm_source=qr" target="_blank">IG</a>
        <a href="" target="_blank"> TU NIC :)</a>
        <a href="mailto:tomas@strasik.cz">CONTACT</a>
    </div>

</body>
</html>

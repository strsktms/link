<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY PAGE</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
            margin: 0;
            padding: 20px;
            text-align: center;
            text-transform: uppercase;
            overflow: hidden; /* DŮLEŽITÉ: Schová posuvníky, aby texty neodjížděly z obrazovky */
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* Fixní středový kontejner pro nadpis a přehrávač, aby se nehýbaly */
        .center-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10; /* Drží přehrávač nad létajícími texty */
            background-color: rgba(0, 0, 0, 0.7); /* Mírné zatmavení podkladu, když text proletí pod přehrávačem */
            padding: 20px;
            border-radius: 20px;
            pointer-events: auto;
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 25px;
            letter-spacing: -1px;
            margin-top: 0;
        }

        .player-container {
            width: 100%;
            max-width: 350px;
        }

        /* Styl pro létající DVD odkazy */
        .dvd-link {
            position: absolute;
            color: #ffffff; /* Výchozí barva před prvním nárazem */
            text-decoration: none;
            font-size: 1.5rem; /* Větší text, aby šel dobře trefit */
            padding: 10px 20px;
            white-space: nowrap;
            user-select: none;
            z-index: 5;
            /* Změna: Přidán plynulý přechod i pro barvu textu (color) */
            transition: background 0.15s, color 0.1s ease-in-out; 
        }

        .dvd-link:hover {
            background-color: #ffffff !important; /* Přepíše dynamickou barvu při najetí myší */
            color: #000000 !important;
        }
    </style>
</head>
<body>

    <div class="center-content">
        <h1>Hi :)</h1>
        <div class="player-container">
            <iframe data-testid="embed-iframe" style="border-radius:12px" src="https://open.spotify.com/embed/track/4zGwSKGXnfpBNHkavKnyIf?utm_source=generator&theme=0" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>
    </div>

    <a href="https://www.instagram.com/strasiktomas_?igsh=eXFmdTdmOHQ3djA3&utm_source=qr" target="_blank" class="dvd-link">IG </a>
    <a href="https://youtu.be/dQw4w9WgXcQ?is=KMe3Zo9ukm3fB1ck" target="_blank" class="dvd-link">page not found</a>
    <a href="mailto:tomas@strasik.cz" class="dvd-link">CONTACT ✉</a>

    <script>
        const links = document.querySelectorAll('.dvd-link');
        
        // --- NOVÉ: Seznam klubových barev pro střídání při odrazu ---
        const clubColors = [
            '#ff0055', // Neonová růžová
            '#00ffff', // Azurová
            '#00ff00', // Neonová zelená
            '#ffaa00', // Oranžová
            '#aa00ff', // Fialová
            '#eeff00', // Žlutá
        ];

        // Pomocná funkce pro získání náhodné barvy ze seznamu
        function getRandomColor() {
            return clubColors[Math.floor(Math.random() * clubColors.length)];
        }

        // Nastavení pro každý odkaz (počáteční pozice, rychlost a směr)
        const items = Array.from(links).map((link, index) => {
            return {
                element: link,
                // Rozhází odkazy na různé startovní pozice
                x: Math.random() * (window.innerWidth - 200),
                y: Math.random() * (window.innerHeight - 100),
                // Rychlost pohybu v pixelech na snímek
                dx: (2 + index * 0.5) * (Math.random() < 0.5 ? 1 : -1),
                dy: (2 + index * 0.5) * (Math.random() < 0.5 ? 1 : -1)
            };
        });

        function updatePhysics() {
            const winWidth = window.innerWidth;
            const winHeight = window.innerHeight;

            items.forEach(item => {
                const rect = item.element.getBoundingClientRect();
                
                // Pohyb
                item.x += item.dx;
                item.y += item.dy;

                // Příznak, zda došlo ke kolizi v tomto snímku animace
                let collided = false;

                // Odraz od levé a pravé stěny
                if (item.x <= 0) {
                    item.x = 0;
                    item.dx = -item.dx;
                    collided = true; // Nastala kolize
                } else if (item.x + rect.width >= winWidth) {
                    item.x = winWidth - rect.width;
                    item.dx = -item.dx;
                    collided = true; // Nastala kolize
                }

                // Odraz od horní a dolní stěny
                if (item.y <= 0) {
                    item.y = 0;
                    item.dy = -item.dy;
                    collided = true; // Nastala kolize
                } else if (item.y + rect.height >= winHeight) {
                    item.y = winHeight - rect.height;
                    item.dy = -item.dy;
                    collided = true; // Nastala kolize
                }

                // --- NOVÉ: Pokud nastala kolize, změníme barvu textu ---
                if (collided) {
                    item.element.style.color = getRandomColor();
                }

                // Aplikování nových souřadnic na prvek
                item.element.style.left = item.x + 'px';
                item.element.style.top = item.y + 'px';
            });

            requestAnimationFrame(updatePhysics);
        }

        // Spuštění animace po načtení stránky
        window.addEventListener('load', () => {
            requestAnimationFrame(updatePhysics);
        });

        // Přepočítání při změně velikosti okna prohlížeče
        window.addEventListener('resize', () => {
            items.forEach(item => {
                const rect = item.element.getBoundingClientRect();
                if (item.x + rect.width > window.innerWidth) item.x = window.innerWidth - rect.width;
                if (item.y + rect.height > window.innerHeight) item.y = window.innerHeight - rect.height;
            });
        });
    </script>

</body>
</html>
